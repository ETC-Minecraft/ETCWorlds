# ============================================================
#   ETCWorlds — config.yml
# ============================================================
# Configuración global del plugin. Las propiedades por mundo
# viven en mundos/<nombre>/etcworlds.yml para mantenerlas junto
# al propio mundo y permitir backup/portabilidad.
# ============================================================

# Carpeta donde se almacenan los mundos creados por ETCWorlds.
# Se crea relativa a la carpeta raíz del servidor. Ejemplo:
#   server/
#     mundos/
#       lobby/
#       skyblock_main/
worlds-folder: "mundos"

# Mundo al que apunta /lobby. Si ETCCore también está instalado, ETCWorlds
# toma el control de /lobby y /spawn para añadir soporte multi-mundo.
lobby-world: "lobby"

# Mundos que SIEMPRE deben estar cargados (no se descargan aunque queden vacíos).
keep-loaded:
  - "world"
  - "lobby"

# Si los mundos vanilla (world, world_nether, world_the_end) deben ser administrados.
manage-vanilla-worlds: true

# === Lazy Load / Idle Unload ===
idle-unload:
  enabled: true
  # Tras cuántos segundos vacío un mundo se descarga.
  unload-after-seconds: 600
  # Cada cuántos segundos se chequea.
  check-interval-seconds: 60
  # Si debe guardar el mundo antes de descargar.
  save-on-unload: true

# === Pre-warmup de chunks ===
# Cuando un jugador hace /world tp, los chunks de destino se cargan
# de forma async ANTES del teleport para evitar lag al aparecer.
preload:
  enabled: true
  # Radio en chunks a precargar alrededor del destino.
  radius: 4
  # Tiempo máximo de espera (ms) para que terminen los chunks antes de teleportar igual.
  timeout-ms: 5000

# === Backups automáticos ===
backups:
  enabled: false
  # Cada cuántas horas se hace un snapshot.
  interval-hours: 24
  # Cuántos backups conservar antes de rotar.
  retain: 7
  # Carpeta destino (relativa a la raíz del server).
  folder: "mundos-backups"
  # Si debe descargar+guardar el mundo antes del snapshot.
  save-before-backup: true
  # Mundos excluidos del backup automático.
  exclude: []

# === Teleport seguro ===
safe-teleport:
  # Busca un bloque sólido en un radio si el destino no es seguro.
  enabled: true
  search-radius: 8
  # Acción si no encuentra ubicación segura: TELEPORT (igual), CANCEL, SPAWN.
  on-unsafe: TELEPORT

# === Mensajes ===
messages:
  prefix: "&8[&bETCWorlds&8] &r"
  no-permission: "&cNo tienes permiso."
  unknown-world: "&cMundo desconocido: &f{world}"
  world-loading: "&7Cargando mundo &f{world}&7..."
  world-loaded: "&aMundo &f{world} &acargado."
  world-already-loaded: "&7El mundo &f{world} &7ya está cargado."
  world-created: "&aMundo &f{world} &acreado correctamente."
  world-deleted: "&aMundo &f{world} &aeliminado."
  world-unloaded: "&aMundo &f{world} &adescargado."
  teleport-success: "&aTe teletransportaste a &f{world}&a."
  teleport-denied: "&cNo tienes acceso a ese mundo."
  preload-timeout: "&7Aún cargando chunks, te teletransporto igual..."
  # Mensajes de ejemplo al entrar/salir de un mundo (se configuran por mundo en etcworlds.yml del mundo)
  # enter-message: "&eBienvenido a &f{world}&e!"
  # exit-message: "&7Saliste de &f{world}&7."
  reload-done: "&aETCWorlds recargado."
