name: ETCWorlds
version: ${project.version}
main: com.etcmc.etcworlds.ETCWorlds
api-version: "1.21"
folia-supported: true
description: Multi-world manager con generators, instancias, lazy-load, links de dimensión, backups y GUI.
author: EmmanuelTC
website: https://github.com/ETC-Minecraft/ETCWorlds
soft-depend: [ETCCore, LuckPerms, PlaceholderAPI, ETCRegionGenerator]
load: STARTUP

commands:
  etcworlds:
    description: Administración de ETCWorlds (crear, eliminar, importar, exportar, configurar mundos).
    usage: /etcworlds <subcomando> [args]
    aliases: [ecw, mvm, mw]
    permission: etcworlds.admin
  world:
    description: Teletransporte rápido a un mundo.
    usage: /world <nombre>
    aliases: [mv, mvtp, wtp]
    permission: etcworlds.tp
  worldlist:
    description: Lista todos los mundos disponibles.
    usage: /worldlist
    aliases: [worlds, mvlist]
    permission: etcworlds.list
  worldinfo:
    description: Información detallada de un mundo.
    usage: /worldinfo [mundo]
    aliases: [winfo, mvinfo]
    permission: etcworlds.info
  worldspawn:
    description: Define el spawn del mundo actual donde estas parado.
    usage: /worldspawn
    aliases: [setworldspawn, wspawn]
    permission: etcworlds.spawn.set
  spawn:
    description: Teletransporte al spawn del mundo actual.
    usage: /spawn
    permission: etcworlds.spawn
  lobby:
    description: Teletransporte al mundo lobby.
    usage: /lobby
    permission: etcworlds.lobby
  pocketworld:
    description: Gestiona tu PocketWorld personal (mundo Void privado).
    usage: /pocketworld [sub]
    aliases: [pw, mundo, isla]
    permission: etcworlds.pw

permissions:
  etcworlds.admin:
    description: Acceso completo a todos los subcomandos administrativos.
    default: op
    children:
      etcworlds.create: true
      etcworlds.delete: true
      etcworlds.import: true
      etcworlds.export: true
      etcworlds.load: true
      etcworlds.unload: true
      etcworlds.reload: true
      etcworlds.set: true
      etcworlds.backup: true
      etcworlds.tp: true
      etcworlds.tp.others: true
      etcworlds.list: true
      etcworlds.info: true
      etcworlds.spawn.set: true
      etcworlds.template: true
      etcworlds.gui: true
      etcworlds.portal: true
  etcworlds.create:
    description: Crear nuevos mundos.
    default: op
  etcworlds.delete:
    description: Eliminar mundos (operación destructiva).
    default: op
  etcworlds.import:
    description: Importar mundos existentes desde la raíz o desde zip.
    default: op
  etcworlds.export:
    description: Exportar mundos a zip.
    default: op
  etcworlds.load:
    description: Cargar mundos manualmente.
    default: op
  etcworlds.unload:
    description: Descargar mundos manualmente.
    default: op
  etcworlds.reload:
    description: Recargar la configuración del plugin.
    default: op
  etcworlds.set:
    description: Cambiar reglas/propiedades de mundos.
    default: op
  etcworlds.backup:
    description: Crear y restaurar backups de mundos.
    default: op
  etcworlds.tp:
    description: Teletransportarse a mundos.
    default: true
  etcworlds.tp.others:
    description: Teletransportar a otros jugadores entre mundos.
    default: op
  etcworlds.list:
    description: Listar mundos.
    default: true
  etcworlds.info:
    description: Ver información de mundos.
    default: true
  etcworlds.spawn.set:
    description: Definir el spawn de un mundo.
    default: op
  etcworlds.template:
    description: Marcar y gestionar mundos plantilla.
    default: op
  etcworlds.gui:
    description: Abrir el panel GUI de gestión de mundos.
    default: op
  etcworlds.bypass.access:
    description: Ignora la whitelist/blacklist de acceso a mundos.
    default: op
  etcworlds.bypass.gamemode:
    description: Ignora el gamemode forzado del mundo.
    default: op
  etcworlds.bypass.pvp:
    description: Ignora la regla PvP del mundo.
    default: op
  etcworlds.spawn:
    description: Permite usar /spawn.
    default: true
  etcworlds.lobby:
    description: Permite usar /lobby.
    default: true
  etcworlds.portal:
    description: Gestionar portales custom (/ecw portal ...).
    default: op
  etcworlds.pw:
    description: Usar /pw (gestionar tu PocketWorld personal).
    default: true
  etcworlds.pw.create:
    description: Crear tu propio PocketWorld.
    default: true
  etcworlds.pw.reset:
    description: Borrar y regenerar tu PocketWorld.
    default: true
  etcworlds.pw.visit:
    description: Visitar el PocketWorld de otros jugadores que te invitaron.
    default: true
  etcworlds.pw.bypass:
    description: Visitar cualquier PocketWorld sin invitacion.
    default: op
  etcworlds.pw.admin:
    description: Borrar el PocketWorld de cualquier jugador.
    default: op
